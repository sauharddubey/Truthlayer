# Render Blueprint — deploys the TruthLayer backend on the free tier.
# Database: use a free Supabase/Neon Postgres (set DATABASE_URL below) since
# Render's free Postgres expires after 30 days. Redis is optional.
#
# 1. Push this repo to GitHub.
# 2. Render → New → Blueprint → select this repo.
# 3. Fill the env vars marked sync:false in the dashboard.
# 4. Deploy the frontend separately on Vercel (see frontend/README.md).

services:
  - type: web
    name: truthlayer-backend
    runtime: docker
    plan: free
    rootDir: backend
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: USE_CELERY
        value: "false"
      # Fernet key for encrypting per-user secrets + signing media URLs.
      - key: ENCRYPTION_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: DATABASE_URL
        sync: false
      # OPTIONAL: only needed so account erasure can also remove the Supabase auth
      # identity. Leave unset to erase local data only.
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: LLM_BASE_URL
        value: https://openrouter.ai/api/v1
      - key: LLM_MODEL
        value: openai/gpt-oss-120b:free
      - key: EMBEDDINGS_PROVIDER
        value: openai
      - key: EMBEDDINGS_DIM
        value: "1536"
      - key: BACKEND_CORS_ORIGINS
        sync: false
    # NOTE: LLM / Tavily / media-integrity API keys are per-user (entered in the
    # app's Settings, stored encrypted) — they are intentionally NOT deploy env
    # vars. SECRET_KEY was unused and has been removed.
